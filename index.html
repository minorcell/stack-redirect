<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <link rel="canonical" href="https://mcell.top/">
    <script>
        const target = "https://mcell.top" + window.location.pathname + window.location.search + window.location.hash
        window.location.replace(target);
    </script>
    <meta http-equiv="refresh" content="0; url=https://mcell.top/">
</head>

<body>
    <p>站点已迁移到 <a href="https://mcell.top/">https://mcell.top/</a></p>
</body>

</html>
